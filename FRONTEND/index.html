<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Drivya is the fast, private and beautifully designed cloud storage built for creators, developers and teams. 10GB free."
    />
    <meta
      property="og:title"
      content="Drivya — Cloud storage for modern teams"
    />
    <meta
      property="og:description"
      content="Upload, organize and share at the speed of thought. End-to-end encrypted by default."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta id="theme-color-meta" name="theme-color" content="#f4f6f9" />
    <title>Drivya — Cloud storage for modern teams</title>
    <script>
      (function () {
        try {
          var k = "drivya-theme";
          var t = localStorage.getItem(k);
          var dark = false;
          if (t === "dark") dark = true;
          else if (t === "light") dark = false;
          else dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
          var meta = document.getElementById("theme-color-meta");
          if (meta) meta.setAttribute("content", dark ? "#0b0e18" : "#f4f6f9");

          // Density
          var density = localStorage.getItem("drivya-density") || "comfortable";
          document.documentElement.setAttribute("data-density", density);

          // Font Size
          var fontSize = localStorage.getItem("drivya-font-size") || "default";
          var fontSizeMap = {
            small: "13px",
            default: "15px",
            medium: "17px",
            large: "19px",
            xl: "21px"
          };
          document.documentElement.style.fontSize = fontSizeMap[fontSize] || "15px";

          // Screen Reader
          var screenReader = localStorage.getItem("drivya-screen-reader") === "true";
          document.documentElement.setAttribute("data-screen-reader", screenReader ? "true" : "false");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
